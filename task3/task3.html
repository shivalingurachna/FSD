<!DOCTYPE html>
<html>
<head>
<h1> registration page  </h1>

<style>
button{
backgroud-color="red;
}
</style>

</head>
<body>
<fieldset>
<legend> registration from  </legend>
<br>

<table>
<thead>
</thead>
</tbody>
<tr>
<td>
<label for="uname">username <font color="red">*</font> </label>
</td>
<td>
<input type="text" id="name" required  placeholder="username" title="fill your name" pattern=[a-zA-Z] >
</td>
</tr>

<tr>
<td>
<label for=upassword >password <font color="red">*</font> </label>
</td>
<td>
<input type="password" id="upassword" required placeholder="password" pattern=[a-zA-Z0-9@#]{1,}{a,}{A,} title="the password should be in all words">
</td>
</tr>

<tr>
<td>
<label> phone number </label></td>
<td>
<input type="number" placeholder="91+xxxxx xxxxx" pattern=[6789]{1} [0-9]{9} ></td>
</tr>

<tr>
<td>
<label>Email</label></td>
<td>
<input type"email" placeholder="EX:xyz2gmail.com" pattern=[a-zA-Z0-9@#&]S ></td>
</tr>

<tr>
<td>
<label> DOB</label></td>
<td>
<input type="date" ></td>
</tr>

<tr>
<td>
<label> aadhar number</label></td>
<td>
<input type="number" placeholder="xxxx xxxx xxxx xxxx" pattern=[0-9]{12} ></td>
</tr>

<tr>
<td>
<label> gender </label></td>
<td>
<input type="radio" name="abc" >female
<input type="radio" name="abc" >male
<input type="radio" name="abc" >NA
</td>
</tr>

<tr>
<td>
<label> languages known<label></td>
<td>
<input type="checkbox" >telugu
<input type="checkbox">englshi
<input type="checkbox" >hindi</td>
</tr>

<tr>
<td>
<label> linkedin <font color="red">*</font></label></td>
<td>
<input type="url" placeholder="url" ></td>
</tr>

<tr>
<td>
<label> range your communication </label></td>
<td>
<input type="range"></td>
</tr>

<tr>
<td>
<label> your resume <font color="red"> *</font></label></td>
<td>
<input type="file"><td>
</tr>

<tr>
<td>
<label> select your fav team</label></td>
<td>
<select>
<option>srh</option>
<option>rcb</option>
<option>csk</option>
<option>gt</option>
</select>
</td>
</tr>
<tr>
<td>
<label> color</label></td>
<td>
<input type="color"></td>
</tr> 

<tr>
<td>
<label> fav city </label></td>
<td>
<input id="city">
<datalist id="city">
<option> hyd </option>
<option> chi </option>
<option> jhv </option>
<option> sni </option>
</datalist>
</td>
</tr>

<tr>
<td>
<label> loction <label></td>
<td>
<input id="loction">
<datalist id="loction">
<option> dnfi</option>
<option> dnfi</option>
<option> dnfi</option>
<datalist>
</td>
</tr>

<tr>
<td> 
<label>write your option in box </label></td>
<td>
<textarea cols="10" rows="10" pattern=[a-zA-Z]{300}></textarea>
</td>
</tr>
<tr>
<td>
<button type="submit" > register </button>
</td>
</tr>
<tbody>
</table>
</fieldset>
